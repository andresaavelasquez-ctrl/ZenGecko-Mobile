name: Android debug APK

on:
  workflow_dispatch:
  push:
    branches: [ main, dev ]
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '8.13'

      - uses: android-actions/setup-android@v3

      - name: Install SDK
        run: sdkmanager "platforms;android-36" "build-tools;36.0.0"

      - name: Restore stable Android signing key
        env:
          ZENGECKO_KEYSTORE_B64: ${{ secrets.ZENGECKO_KEYSTORE_B64 }}
        run: |
          test -n "$ZENGECKO_KEYSTORE_B64" || {
            echo "Missing repository secret ZENGECKO_KEYSTORE_B64"
            exit 1
          }
          printf '%s' "$ZENGECKO_KEYSTORE_B64" | base64 --decode > "$RUNNER_TEMP/zengecko-update.jks"

      - name: Build signed debug APK
        env:
          ZEN_KEYSTORE_FILE: ${{ runner.temp }}/zengecko-update.jks
          ZEN_STORE_PASSWORD: ${{ secrets.ZENGECKO_STORE_PASSWORD }}
          ZEN_KEY_ALIAS: ${{ secrets.ZENGECKO_KEY_ALIAS }}
          ZEN_KEY_PASSWORD: ${{ secrets.ZENGECKO_KEY_PASSWORD }}
        run: |
          test -n "$ZEN_STORE_PASSWORD"
          test -n "$ZEN_KEY_ALIAS"
          test -n "$ZEN_KEY_PASSWORD"
          gradle :app:assembleDebug --stacktrace

      - uses: actions/upload-artifact@v4
        with:
          name: ZenBrowser-v0.1.20-debug
          path: app/build/outputs/apk/debug/app-debug.apk
